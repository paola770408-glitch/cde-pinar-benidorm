function getMapQuery(campo) {
  if(campo.includes("Raul Mesa") || campo.includes("Guillermo Amor")) return "Ciudad+Deportiva+Guillermo+Amor+Benidorm";
  if(campo.includes("L'Illa")) return "Palau+d+Esports+l+Illa+de+Benidorm";
  if(campo.includes("Altea")) return "Palau+d+Esports+Vila+d+Altea";
  if(campo.includes("Pau Gasol") || campo.includes("Alfaz del Pi")) return "Pabellon+Pau+Gasol+Alfaz+del+Pi";
  if(campo.includes("Villajoyosa")) return "Pabellon+Maisa+Lloret+Villajoyosa";
  if(campo.includes("Calpe")) return "Polideportivo+Calpe";
  return "Benidorm";
}

function switchTab(view) {
  activeView = view;
  ["partidos","grupos","final","sedes"].forEach(v => {
    document.getElementById('tab-' + v).className = v === view ? activeClass : inactiveClass;
    document.getElementById('view-' + v).classList.toggle('hidden', v !== view);
  });
  document.getElementById('category-block').classList.toggle('hidden', view === 'sedes');
  renderAll();
}

["partidos","grupos","final","sedes"].forEach(v => document.getElementById('tab-' + v).addEventListener('click', () => switchTab(v)));

function renderCategories() {
  const box = document.getElementById('category-buttons');
  box.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.innerText = cat;
    btn.className = cat === selectedCategory
      ? "px-5 py-2.5 rounded-full text-sm font-bold border-2 bg-green-600 text-white border-green-600 shadow-md transform scale-105 transition-all"
      : "px-5 py-2.5 rounded-full text-sm font-bold border-2 bg-white text-gray-600 border-gray-300 hover:border-green-500 hover:text-green-600 cursor-pointer transition-all";
    btn.onclick = () => { selectedCategory = cat; renderAll(); };
    box.appendChild(btn);
  });
}

  return `
  <div class="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden">

          <p class="text-xs text-green-700 font-bold mt-2 bg-green-50 inline-block px-2 py-1 rounded">Grupo ${m.group} · ${m.phase}</p>

        <div class="text-center bg-red-50 text-red-700 px-4 py-3 rounded-lg border border-red-100 shadow-inner min-w-[80px]">

      </div>
    </div>

}

function renderMatches() {
  const filtered = matchesData.filter(m => m.category === selectedCategory);
  const info = categoryInfo[selectedCategory];
  document.getElementById('matches-container').innerHTML = `
    <div class="bg-white border border-green-200 p-4 rounded-xl shadow-sm mb-4 border-l-4 border-l-green-500">
      <div class="text-xs font-black text-green-700 uppercase">${info.code} · Grupo ${info.group}</div>
      <div class="font-black text-gray-800 mt-1">${info.official}</div>
    </div>
    <div class="space-y-4 fade-in">${filtered.map(matchCard).join('')}</div>`;
}

function renderGroups() {
  const info = categoryInfo[selectedCategory];
  const groups = groupsData[info.code];
  let html = `<div class="bg-yellow-50 border border-yellow-200 p-3 rounded-lg mb-4 text-sm text-yellow-800 font-semibold">👥 Categoría ${info.code}. El CDE Pinar está en el <strong>Grupo ${info.group}</strong>.</div><div class="space-y-4">`;
  Object.keys(groups).forEach(g => {
    const isMine = g === info.group;
    html += `<div class="bg-white border ${isMine ? 'border-green-400 border-l-4 border-l-green-500 shadow-md' : 'border-gray-200 shadow-sm'} p-4 rounded-xl">
      <div class="flex justify-between items-center mb-3"><h3 class="font-black text-gray-800 text-lg">Grupo ${g}</h3>${isMine ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-black">CDE PINAR</span>' : ''}</div>
      <div class="space-y-2">${groups[g].map(t => `<div class="p-2 rounded-lg border text-sm font-bold ${t.includes('PINAR') ? 'bg-green-50 border-green-200 text-green-800' : 'bg-gray-50 border-gray-100 text-gray-700'}">${t.includes('PINAR') ? '⭐ ' : ''}${t}</div>`).join('')}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('groups-container').innerHTML = html;
}

function renderVenues() {

function renderAll() {
