/*
  ===========================================================================
  RESULTADOS AUTOMÁTICOS
  ===========================================================================
  Sustituye la línea de abajo por la URL real de tu resultados.json en
  GitHub (algo como:
  "https://raw.githubusercontent.com/paola770408-glitch/cde-pinar-benidorm/main/resultados.json")
  Ese archivo lo genera y actualiza solo el robot de GitHub Actions.
  Si no lo rellenas, la app sigue funcionando igual que antes (manual).
  ===========================================================================
*/
const RESULTADOS_URL = "https://raw.githubusercontent.com/paola770408-glitch/cde-pinar-benidorm/main/resultados.json";
let rawPartidos = [];

async function cargarResultadosAutomaticos() {
  if (!RESULTADOS_URL || RESULTADOS_URL.includes("TU-USUARIO")) return;
  try {
    const res = await fetch(RESULTADOS_URL, { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      rawPartidos = data.partidos || [];
      renderAll();
    }
  } catch (e) {
    console.warn("No se pudieron cargar los resultados automáticos:", e);
  }
}

function obtenerResultado(num) {
  const p = rawPartidos.find(p => String(p.num) === String(num));
  return p && p.resultado ? p.resultado : null;
}

function calcularClasificacion(codigo, grupo) {
  const partidos = rawPartidos.filter(p =>
    p.categoria === codigo && String(p.grupo) === String(grupo) && p.fase === "Liguilla" && p.resultado
  );
  if (partidos.length === 0) return null;

  const tabla = {};
  const fila = team => (tabla[team] ||= { team, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, pts: 0 });

  partidos.forEach(p => {
    const partes = p.resultado.split('-').map(s => parseInt(s.trim(), 10));
    if (partes.length !== 2 || partes.some(isNaN)) return;
    const [gl, gv] = partes;
    const L = fila(p.local), V = fila(p.visitante);
    L.pj++; V.pj++;
    L.gf += gl; L.gc += gv;
    V.gf += gv; V.gc += gl;
    if (gl > gv) { L.pg++; L.pts += 3; V.pp++; }
    else if (gl < gv) { V.pg++; V.pts += 3; L.pp++; }
    else { L.pe++; V.pe++; L.pts += 1; V.pts += 1; }
  });

  return Object.values(tabla)
    .sort((a, b) => b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf)
    .map((r, i) => ({ ...r, pos: i + 1 }));
}

/*
  ===========================================================================
  RESOLUCIÓN AUTOMÁTICA DE LA FASE FINAL
  ===========================================================================
  Convierte nombres provisionales como "1º GRUPO 1", "2º Mejor 3º" o
  "GANADOR PARTIDO Nº108" en el nombre real del equipo, usando la
  clasificación calculada y los resultados ya conocidos. No hace falta
  editar nada a mano: en cuanto el robot traiga los resultados, esto se
  recalcula solo cada vez que se abre la app.
  ===========================================================================
*/
function mejoresTerceros(codigo) {
  const grupos = Object.keys(groupsData[codigo] || {});
  return grupos
    .map(g => {
      const tabla = calcularClasificacion(codigo, g);
      return tabla ? tabla.find(r => r.pos === 3) : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf);
}

function resolverEquipo(codigo, nombre, finalsCodigo, cache = {}) {
  if (!nombre) return nombre;
  if (cache[nombre]) return cache[nombre];

  let m;
  if ((m = nombre.match(/^([1-4])º GRUPO (\d+)$/))) {
    const pos = parseInt(m[1], 10), grupo = m[2];
    const tabla = calcularClasificacion(codigo, grupo);
    const fila = tabla && tabla[pos - 1];
    return fila ? fila.team : nombre;
  }
  if ((m = nombre.match(/^([1-3])º Mejor 3º$/))) {
    const pos = parseInt(m[1], 10);
    const fila = mejoresTerceros(codigo)[pos - 1];
    return fila ? fila.team : nombre;
  }
  if ((m = nombre.match(/^GANADOR PARTIDO Nº(\d+)$/))) {
    const numRef = parseInt(m[1], 10);
    const fixture = finalsCodigo.find(f => f.num === numRef);
    if (!fixture) return nombre;
    const resultadoRef = fixture.resultado || obtenerResultado(fixture.num);
    if (!resultadoRef) return nombre; // ese partido aún no se ha jugado
    const partes = resultadoRef.split('-').map(s => parseInt(s.trim(), 10));
    if (partes.length !== 2 || partes.some(isNaN) || partes[0] === partes[1]) return nombre;
    cache[nombre] = nombre; // evita bucles infinitos por si hay referencias cruzadas
    const localResuelto = resolverEquipo(codigo, fixture.local, finalsCodigo, cache);
    const visitorResuelto = resolverEquipo(codigo, fixture.visitor, finalsCodigo, cache);
    return partes[0] > partes[1] ? localResuelto : visitorResuelto;
  }
  return nombre; // ya es un nombre real
}

function getMapQuery(campo) {
  if(campo.includes("Raul Mesa") || campo.includes("Guillermo Amor")) return "Ciudad+Deportiva+Guillermo+Amor+Benidorm";
  if(campo.includes("L'Illa")) return "Palau+d+Esports+l+Illa+de+Benidorm";
  if(campo.includes("Altea")) return "Palau+d+Esports+Vila+d+Altea";
  if(campo.includes("Pau Gasol") || campo.includes("Alfaz del Pi")) return "Pabellon+Pau+Gasol+Alfaz+del+Pi";
  if(campo.includes("Villajoyosa")) return "Pabellon+Maisa+Lloret+Villajoyosa";
  if(campo.includes("Calpe")) return "Polideportivo+Calpe";
  return "Benidorm";
}

function switchTab(view) {
  activeView = view;
  ["partidos","grupos","final","sedes"].forEach(v => {
    document.getElementById('tab-' + v).className = v === view ? activeClass : inactiveClass;
    document.getElementById('view-' + v).classList.toggle('hidden', v !== view);
  });
  document.getElementById('category-block').classList.toggle('hidden', view === 'sedes');
  renderAll();
}

["partidos","grupos","final","sedes"].forEach(v => document.getElementById('tab-' + v).addEventListener('click', () => switchTab(v)));

function renderCategories() {
  const box = document.getElementById('category-buttons');
  box.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.innerText = cat;
    btn.className = cat === selectedCategory
      ? "px-5 py-2.5 rounded-full text-sm font-bold border-2 bg-green-600 text-white border-green-600 shadow-md transform scale-105 transition-all"
      : "px-5 py-2.5 rounded-full text-sm font-bold border-2 bg-white text-gray-600 border-gray-300 hover:border-green-500 hover:text-green-600 cursor-pointer transition-all";
    btn.onclick = () => { selectedCategory = cat; renderAll(); };
    box.appendChild(btn);
  });
}

function resultBadge(resultado) {
  if (!resultado) return null;
  const [a, b] = resultado.split('-').map(s => parseInt(s.trim(), 10));
  if (isNaN(a) || isNaN(b)) return null;
  if (a > b) return { label: '✅ VICTORIA', cls: 'bg-green-100 text-green-700 border-green-200' };
  if (a < b) return { label: '❌ DERROTA', cls: 'bg-red-100 text-red-700 border-red-200' };
  return { label: '🤝 EMPATE', cls: 'bg-gray-100 text-gray-700 border-gray-200' };
}

        <div class="text-center ${resultado ? 'bg-gray-800 text-white' : 'bg-red-50 text-red-700 border-red-100'} px-4 py-3 rounded-lg border shadow-inner min-w-[80px]">
          ${resultado
            ? `<div class="text-[10px] font-bold uppercase tracking-widest mb-1 opacity-80">Resultado</div><div class="font-black text-2xl tracking-tighter">${resultado}</div>`
            : `<div class="text-[10px] font-bold uppercase tracking-widest mb-1 opacity-80">Hora</div><div class="font-black text-2xl tracking-tighter">${m.time}</div>`}
        </div>
      </div>
      <div class="mt-3 pt-3 border-t border-gray-100 flex flex-col gap-2">
        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">Campo Asignado:</div>
        <div class="text-sm text-gray-800 flex items-start gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100">
          <span class="text-base leading-none mt-0.5">📍</span><span class="font-bold flex-1 leading-snug">${m.campo}</span>
        </div>
        <a href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" class="w-full inline-block text-center bg-blue-100 text-blue-700 py-2 rounded-lg text-sm font-bold hover:bg-blue-200 transition-colors">🗺️ Navegar al campo</a>
      </div>
    </div>
  </div>`;
}

function renderMatches() {
  const filtered = matchesData.filter(m => m.category === selectedCategory);
  const info = categoryInfo[selectedCategory];
  document.getElementById('matches-container').innerHTML = `
    <div class="bg-white border border-green-200 p-4 rounded-xl shadow-sm mb-4 border-l-4 border-l-green-500">
      <div class="text-xs font-black text-green-700 uppercase">${info.code} · Grupo ${info.group}</div>
      <div class="font-black text-gray-800 mt-1">${info.official}</div>
    </div>
    <div class="space-y-4 fade-in">${filtered.map(matchCard).join('')}</div>`;
}

function standingsTable(rows, myTeamMatcher) {
  return `<div class="overflow-x-auto -mx-1">
    <table class="w-full text-[11px] border-collapse">
      <thead>
        <tr class="bg-gray-100 text-gray-500 font-bold uppercase">
          <th class="px-1.5 py-2 text-left">#</th>
          <th class="px-1.5 py-2 text-left">Equipo</th>
          <th class="px-1 py-2">PJ</th><th class="px-1 py-2">G</th><th class="px-1 py-2">E</th><th class="px-1 py-2">P</th>
          <th class="px-1 py-2">GF</th><th class="px-1 py-2">GC</th><th class="px-1 py-2">Pts</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `<tr class="border-b border-gray-100 ${myTeamMatcher(r.team) ? 'bg-green-50 font-black text-green-800' : 'text-gray-700 font-semibold'}">
          <td class="px-1.5 py-2">${r.pos}</td>
          <td class="px-1.5 py-2">${myTeamMatcher(r.team) ? '⭐ ' : ''}${r.team}</td>
          <td class="px-1 py-2 text-center">${r.pj}</td><td class="px-1 py-2 text-center">${r.pg}</td><td class="px-1 py-2 text-center">${r.pe}</td><td class="px-1 py-2 text-center">${r.pp}</td>
          <td class="px-1 py-2 text-center">${r.gf}</td><td class="px-1 py-2 text-center">${r.gc}</td>
          <td class="px-1 py-2 text-center">${r.pts}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderGroups() {
  const info = categoryInfo[selectedCategory];
  const groups = groupsData[info.code];
  const standingsManual = standingsData[info.code] || {};
  let html = `<div class="bg-yellow-50 border border-yellow-200 p-3 rounded-lg mb-4 text-sm text-yellow-800 font-semibold">👥 Categoría ${info.code}. El CDE Pinar está en el <strong>Grupo ${info.group}</strong>.</div><div class="space-y-4">`;
  Object.keys(groups).forEach(g => {
    const isMine = g === info.group;
    const rows = standingsManual[g] || calcularClasificacion(info.code, g);
    html += `<div class="bg-white border ${isMine ? 'border-green-400 border-l-4 border-l-green-500 shadow-md' : 'border-gray-200 shadow-sm'} p-4 rounded-xl">
      <div class="flex justify-between items-center mb-3"><h3 class="font-black text-gray-800 text-lg">Grupo ${g}</h3>${isMine ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-black">CDE PINAR</span>' : ''}</div>
      ${rows
        ? standingsTable(rows, t => t.includes('PINAR'))
        : `<div class="space-y-2">${groups[g].map(t => `<div class="p-2 rounded-lg border text-sm font-bold ${t.includes('PINAR') ? 'bg-green-50 border-green-200 text-green-800' : 'bg-gray-50 border-gray-100 text-gray-700'}">${t.includes('PINAR') ? '⭐ ' : ''}${t}</div>`).join('')}</div>
           <p class="text-[11px] text-gray-400 font-semibold mt-2">⏳ Clasificación aún no disponible</p>`}
    </div>`;
  });
  html += `</div>`;
  document.getElementById('groups-container').innerHTML = html;
}

function finalCard(f, finalsCodigo) {
  const isA = f.phase.includes('A');
  const mapQuery = getMapQuery(f.campo);
  const resultado = f.resultado || obtenerResultado(f.num);
  const local = resolverEquipo(f.code, f.local, finalsCodigo);
  const visitor = resolverEquipo(f.code, f.visitor, finalsCodigo);
  const localEsPinar = local.includes('PINAR');
  const visitorEsPinar = visitor.includes('PINAR');
  let badge = null;
  if (resultado && (localEsPinar || visitorEsPinar)) {
    const partes = resultado.split('-').map(s => parseInt(s.trim(), 10));
    if (partes.length === 2 && !partes.some(isNaN)) {
      const [gl, gv] = partes;
      if (gl === gv) badge = { label: '🤝 EMPATE', cls: 'bg-gray-100 text-gray-700 border-gray-200' };
      else {
        const pinarGano = (localEsPinar && gl > gv) || (visitorEsPinar && gv > gl);
        badge = pinarGano
          ? { label: '✅ VICTORIA PINAR', cls: 'bg-green-100 text-green-700 border-green-200' }
          : { label: '❌ DERROTA PINAR', cls: 'bg-red-100 text-red-700 border-red-200' };
      }
    }
  }
  return `<div class="bg-white border ${isA ? 'border-yellow-300' : 'border-blue-200'} shadow-sm rounded-xl overflow-hidden">
    <div class="${isA ? 'bg-yellow-100 text-yellow-800' : 'bg-blue-100 text-blue-800'} px-4 py-2 text-xs font-black border-b flex justify-between gap-2">
      <span>${f.phase} · ${f.round}</span><span>Nº ${f.num}</span>
    </div>
    <div class="p-4">
      <div class="flex justify-between items-start gap-3">
        <div class="flex-1">
          <p class="font-black ${localEsPinar ? 'text-green-700' : 'text-gray-800'} leading-tight">${localEsPinar ? '⭐ ' : ''}${local}</p>
          <p class="text-xs text-gray-400 font-bold my-1">contra</p>
          <p class="font-black ${visitorEsPinar ? 'text-green-700' : 'text-gray-800'} leading-tight">${visitorEsPinar ? '⭐ ' : ''}${visitor}</p>
          ${badge ? `<p class="text-xs font-black mt-2 border inline-block px-2 py-1 rounded ${badge.cls}">${badge.label}</p>` : ''}
        </div>
        <div class="text-center ${resultado ? 'bg-gray-800 text-white' : 'bg-gray-50 border-gray-200'} px-3 py-2 rounded-lg border min-w-[76px]">
          ${resultado
            ? `<div class="text-[10px] font-bold uppercase opacity-80">Resultado</div><div class="font-black text-xl">${resultado}</div>`
            : `<div class="text-[10px] text-gray-400 font-bold uppercase">Hora</div><div class="font-black text-gray-800 text-xl">${f.time}</div>`}
        </div>
      </div>
      <p class="text-xs text-gray-500 font-bold mt-3">🗓️ ${f.date}</p>
      <div class="text-sm text-gray-800 flex items-start gap-2 bg-gray-50 p-2 rounded-lg border border-gray-100 mt-2"><span>📍</span><span class="font-bold flex-1 leading-snug">${f.campo}</span></div>
      <a href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" class="mt-2 w-full inline-block text-center bg-blue-100 text-blue-700 py-2 rounded-lg text-sm font-bold hover:bg-blue-200 transition-colors">🗺️ Navegar al campo</a>
    </div>
  </div>`;
}

function renderFaseFinal() {
  const info = categoryInfo[selectedCategory];
  const finals = finalData.filter(f => f.code === info.code);
  document.getElementById('final-container').innerHTML = `
    <div class="bg-yellow-50 border border-yellow-200 p-3 rounded-lg mb-4 text-sm text-yellow-800 font-semibold">
      🏆 Cruces oficiales de ${info.code}. Los nombres de equipo y los resultados se completan solos en cuanto hay datos suficientes (clasificación o partido anterior jugado).
    </div>
    <div class="bg-white border border-gray-200 rounded-xl p-3 mb-4 text-xs text-gray-600 font-bold">
      Regla práctica: si el equipo queda arriba jugará Fase Final A; si queda más abajo, Fase Final B o cruces de consolación según formato de su categoría.
    </div>
    <div class="space-y-4">${finals.map(f => finalCard(f, finals)).join('')}</div>`;
}

function renderVenues() {
  document.getElementById('venues-container').innerHTML = venues.map(v => `
    <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
      <h3 class="font-black text-gray-800 text-lg leading-tight mb-1">${v.name}${v.sub ? `<br><span class="text-sm font-bold text-gray-500">${v.sub}</span>` : ''}</h3>
      <p class="text-sm text-gray-800 font-bold mt-2">📍 ${v.address}</p>
      <a href="https://www.google.com/maps/search/?api=1&query=${v.q}" target="_blank" class="mt-3 w-full inline-block text-center bg-blue-100 text-blue-700 py-2.5 rounded-lg text-sm font-bold hover:bg-blue-200 transition-colors">🗺️ NAVEGAR EN MAPA</a>
    </div>`).join('');
}

function renderAll() {
  renderCategories();
  if(activeView === 'partidos') renderMatches();
  if(activeView === 'grupos') renderGroups();
  if(activeView === 'final') renderFaseFinal();
  if(activeView === 'sedes') renderVenues();
}

renderVenues();
renderAll();
cargarResultadosAutomaticos();
</script>
</body>
</html>
